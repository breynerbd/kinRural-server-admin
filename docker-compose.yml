services:
  db:
    image: postgres:15
    container_name: kinrural-db
    environment:
      POSTGRES_DB: kinrural
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app-admin:
    build:
      context: ..
      dockerfile: kinRural-server-admin/Dockerfile
    container_name: kinrural-admin
    command: npm start
    ports:
      - "3005:3005"
    volumes:
      - ..:/usr/src
    depends_on:
      - db

volumes:
  postgres_data:
